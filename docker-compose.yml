services:
  api-server-1:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      MQTT_BROKER_COUNT: 5
      MQTT_BROKER_NAME_PREFIX: mosquitto
      MQTT_TOPIC_PREFIX: iot
    depends_on:
      redis:
        condition: service_healthy
      mosquitto-1:
        condition: service_healthy
      mosquitto-2:
        condition: service_healthy
      mosquitto-3:
        condition: service_healthy
      mosquitto-4:
        condition: service_healthy
      mosquitto-5:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  api-server-2:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      MQTT_BROKER_COUNT: 5
      MQTT_BROKER_NAME_PREFIX: mosquitto
      MQTT_TOPIC_PREFIX: iot
    depends_on:
      redis:
        condition: service_healthy
      mosquitto-1:
        condition: service_healthy
      mosquitto-2:
        condition: service_healthy
      mosquitto-3:
        condition: service_healthy
      mosquitto-4:
        condition: service_healthy
      mosquitto-5:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx-lb
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./data/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://api-server-1:8000/api/health >/dev/null && wget -qO- http://api-server-2:8000/api/health >/dev/null",
        ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    depends_on:
      api-server-1:
        condition: service_healthy
      api-server-2:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: db-redis
    expose:
      - 6379
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  mosquitto-1:
    image: eclipse-mosquitto:2
    container_name: mosquitto-1
    ports:
      - "1883:1883"
    volumes:
      - ./data/mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./data/mosquitto-1/data:/mosquitto/data
      - ./data/mosquitto-1/log:/mosquitto/log
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "127.0.0.1", "-p", "1883", "-t", "healthcheck", "-m", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  mosquitto-2:
    image: eclipse-mosquitto:2
    container_name: mosquitto-2
    expose:
      - "1883"
    volumes:
      - ./data/mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./data/mosquitto-2/data:/mosquitto/data
      - ./data/mosquitto-2/log:/mosquitto/log
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "127.0.0.1", "-p", "1883", "-t", "healthcheck", "-m", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  mosquitto-3:
    image: eclipse-mosquitto:2
    container_name: mosquitto-3
    expose:
      - "1883"
    volumes:
      - ./data/mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./data/mosquitto-3/data:/mosquitto/data
      - ./data/mosquitto-3/log:/mosquitto/log
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "127.0.0.1", "-p", "1883", "-t", "healthcheck", "-m", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  mosquitto-4:
    image: eclipse-mosquitto:2
    container_name: mosquitto-4
    expose:
      - "1883"
    volumes:
      - ./data/mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./data/mosquitto-4/data:/mosquitto/data
      - ./data/mosquitto-4/log:/mosquitto/log
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "127.0.0.1", "-p", "1883", "-t", "healthcheck", "-m", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  mosquitto-5:
    image: eclipse-mosquitto:2
    container_name: mosquitto-5
    expose:
      - "1883"
    volumes:
      - ./data/mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./data/mosquitto-5/data:/mosquitto/data
      - ./data/mosquitto-5/log:/mosquitto/log
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "127.0.0.1", "-p", "1883", "-t", "healthcheck", "-m", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  c-subscriber:
    build:
      context: ./server/c_subscriber
      dockerfile: Dockerfile
    container_name: c_subscriber
    depends_on:
      redis:
        condition: service_healthy
      mosquitto-1:
        condition: service_healthy
