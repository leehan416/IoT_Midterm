services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: iot-midterm-server
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
