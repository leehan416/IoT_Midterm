services:
  api-server-1:
    build:
      context: ./server
      dockerfile: Dockerfile
    volumes:
      - ./server/app/static:/app/app/static
      - ./server/app/templates:/app/app/templates
    environment:
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      MQTT_HOST: ${MQTT_HOST}
      MQTT_PORT: ${MQTT_PORT}
      MQTT_BROKER_COUNT: ${MQTT_BROKER_COUNT}
      MQTT_BROKER_NAME_PREFIX: ${MQTT_BROKER_NAME_PREFIX}
      MQTT_DEFAULT_HOST: ${MQTT_DEFAULT_HOST}
      MQTT_ADVERTISED_HOST: ${API_SERVER_1_MQTT_ADVERTISED_HOST}
      MQTT_ADVERTISED_PORT_START: ${MQTT_ADVERTISED_PORT_START}
      MQTT_TOPIC_PREFIX: ${MQTT_TOPIC_PREFIX}
      MQTT_PUBLISHER_TTL_SECONDS: ${MQTT_PUBLISHER_TTL_SECONDS:-20}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  api-server-2:
    build:
      context: ./server
      dockerfile: Dockerfile
    volumes:
      - ./server/app/static:/app/app/static
      - ./server/app/templates:/app/app/templates
    environment:
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      MQTT_HOST: ${MQTT_HOST}
      MQTT_PORT: ${MQTT_PORT}
      MQTT_BROKER_COUNT: ${MQTT_BROKER_COUNT}
      MQTT_BROKER_NAME_PREFIX: ${MQTT_BROKER_NAME_PREFIX}
      MQTT_DEFAULT_HOST: ${MQTT_DEFAULT_HOST}
      MQTT_ADVERTISED_HOST: ${API_SERVER_2_MQTT_ADVERTISED_HOST}
      MQTT_ADVERTISED_PORT_START: ${MQTT_ADVERTISED_PORT_START}
      MQTT_TOPIC_PREFIX: ${MQTT_TOPIC_PREFIX}
      MQTT_PUBLISHER_TTL_SECONDS: ${MQTT_PUBLISHER_TTL_SECONDS:-20}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx-lb
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./data/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://api-server-1:8000/api/health >/dev/null && wget -qO- http://api-server-2:8000/api/health >/dev/null",
        ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    depends_on:
      api-server-1:
        condition: service_healthy
      api-server-2:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: db-redis
    expose:
      - 6379
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
