<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>{{ title }}</title>
    <link rel="stylesheet" href="/static/css/app.css"/>
    <style>
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .video-card {
            border: 1px solid #ccc;
            border-radius: 8px;
            overflow: hidden;
            background: #f9f9f9;
        }
        .video-card h3 {
            margin: 0;
            padding: 10px;
            background: #eee;
            border-bottom: 1px solid #ccc;
            text-align: center;
        }
        .video-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
            background: #444;
        }
    </style>
</head>
<body>
<main class="container">
    <h1>IoT Video Dashboard</h1>
    <p>실시간 카메라 스트리밍 (MQTT MJPEG)</p>
    
    <div class="video-grid">
        <div class="video-card">
            <h3>Camera 1</h3>
            <img src="/api/video/stream/cam1" alt="Cam1 Stream">
        </div>
        <div class="video-card">
            <h3>Camera 2</h3>
            <img src="/api/video/stream/cam2" alt="Cam2 Stream">
        </div>
        <div class="video-card">
            <h3>Camera 3</h3>
            <img src="/api/video/stream/cam3" alt="Cam3 Stream">
        </div>
    </div>
</main>
</body>
</html>
