<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>{{ title }}</title>
    <link rel="stylesheet" href="/static/css/app.css"/>
    <style>
        .video-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 20px;
            margin-top: 20px;
            align-items: start;
        }
        .video-card {
            border: 1px solid #ccc;
            border-radius: 8px;
            overflow: hidden;
            background: #f9f9f9;
        }
        .video-card h3 {
            margin: 0;
            padding: 10px;
            background: #eee;
            border-bottom: 1px solid #ccc;
            text-align: center;
        }
        .video-meta {
            margin: 0;
            padding: 8px 10px;
            border-bottom: 1px solid #ddd;
            background: #f3f3f3;
            font-size: 12px;
            color: #333;
            line-height: 1.5;
            word-break: break-all;
        }
        .video-meta strong {
            font-weight: 700;
        }
        .video-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
            background: #444;
        }
        @media (max-width: 1200px) {
            .video-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }
        @media (max-width: 768px) {
            .video-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<main class="container">
    <h1>IoT Video Dashboard</h1>
    <p>실시간 카메라 스트리밍 (MQTT + WebSocket)</p>
    <p id="publisher-count">연결된 퍼블리셔: 0</p>

    <div class="video-grid" id="video-grid"></div>
</main>

<script>
    const POLL_INTERVAL_MS = 3000;
    const RECONNECT_DELAY_MS = 1000;
    const MAX_RETRY = 3;

    const videoGrid = document.getElementById("video-grid");
    const publisherCountEl = document.getElementById("publisher-count");

    const reconnectTimers = new Map();
    const socketByPublisherId = new Map();
    const retryCountByPublisher = new Map();
    const knownPublisherIds = new Set();

    function connectPublisher(publisherId) {
        if (socketByPublisherId.has(publisherId)) return;

        const img = document.getElementById(`publisher-${publisherId}-image`);
        if (!img) return;

        const protocol = location.protocol === "https:" ? "wss" : "ws";
        const ws = new WebSocket(`${protocol}://${location.host}/api/ws/video/${publisherId}`);
        socketByPublisherId.set(publisherId, ws);

        if (!retryCountByPublisher.has(publisherId)) {
            retryCountByPublisher.set(publisherId, 0);
        }

        ws.onopen = () => {
            retryCountByPublisher.set(publisherId, 0);
        };

        ws.onmessage = (event) => {
            const payload = JSON.parse(event.data);
            if (payload.type !== "frame" || !payload.image) return;

            img.src = `data:image/jpeg;base64,${payload.image}`;

            // 프레임 정상 수신 시 재시도 횟수 초기화
            retryCountByPublisher.set(publisherId, 0);
        };

        ws.onclose = () => {
            socketByPublisherId.delete(publisherId);

            if (reconnectTimers.has(publisherId)) {
                clearTimeout(reconnectTimers.get(publisherId));
                reconnectTimers.delete(publisherId);
            }

            if (!knownPublisherIds.has(publisherId)) return;

            const retryCount = retryCountByPublisher.get(publisherId) || 0;

            if (retryCount >= MAX_RETRY) {
                console.warn(`publisher-${publisherId} reconnect failed ${retryCount} times -> refreshing page`);
                window.location.reload();
                return;
            }

            retryCountByPublisher.set(publisherId, retryCount + 1);

            reconnectTimers.set(
                publisherId,
                setTimeout(() => {
                    connectPublisher(publisherId);
                }, RECONNECT_DELAY_MS)
            );
        };

        ws.onerror = () => {
            // 에러 발생 시 onclose 흐름으로 넘김
            ws.close();
        };
    }

    function createPublisherCard(publisher) {
        const publisherId = String(publisher.id);
        const brokerStatus = publisher.broker_is_active ? "UP" : "DOWN";

        const card = document.createElement("div");
        card.className = "video-card";
        card.id = `publisher-${publisherId}-card`;
        card.innerHTML = `
            <h3>publisher-${publisherId}</h3>
            <p class="video-meta">
                <strong>Topic:</strong> ${publisher.topic}<br>
                <strong>Broker:</strong> #${publisher.broker_id} (${publisher.broker_host}:${publisher.broker_port})<br>
                <strong>Status:</strong> ${brokerStatus}
            </p>
            <img id="publisher-${publisherId}-image" alt="publisher-${publisherId} Stream">
        `;
        return card;
    }

    function removePublisher(publisherId) {
        knownPublisherIds.delete(publisherId);

        const timer = reconnectTimers.get(publisherId);
        if (timer) {
            clearTimeout(timer);
            reconnectTimers.delete(publisherId);
        }

        const ws = socketByPublisherId.get(publisherId);
        if (ws) {
            socketByPublisherId.delete(publisherId);
            ws.close();
        }

        retryCountByPublisher.delete(publisherId);

        const card = document.getElementById(`publisher-${publisherId}-card`);
        if (card) card.remove();
    }

    function renderEmptyStateIfNeeded() {
        if (knownPublisherIds.size > 0) return;
        videoGrid.innerHTML = '<p id="publisher-empty">등록된 퍼블리셔가 없습니다.</p>';
    }

    async function loadPublishersAndConnect() {
        try {
            const response = await fetch("/api/publisher/");
            if (!response.ok) throw new Error("failed");

            const publishers = await response.json();
            const activePublishers = publishers
                .filter((publisher) => publisher && publisher.id !== undefined && publisher.id !== null)
                .sort((a, b) => Number(a.id) - Number(b.id));

            const nextIds = new Set(activePublishers.map((publisher) => String(publisher.id)));

            publisherCountEl.textContent = `연결된 퍼블리셔: ${publishers.length}`;

            const emptyEl = document.getElementById("publisher-empty");
            if (emptyEl) emptyEl.remove();

            activePublishers.forEach((publisher) => {
                const publisherId = String(publisher.id);

                if (!knownPublisherIds.has(publisherId)) {
                    knownPublisherIds.add(publisherId);
                    videoGrid.appendChild(createPublisherCard(publisher));
                    connectPublisher(publisherId);
                }
            });

            Array.from(knownPublisherIds).forEach((publisherId) => {
                if (!nextIds.has(publisherId)) {
                    removePublisher(publisherId);
                }
            });

            renderEmptyStateIfNeeded();
        } catch (e) {
            videoGrid.innerHTML = "<p>퍼블리셔 목록을 불러오지 못했습니다.</p>";
        }
    }

    loadPublishersAndConnect();
    setInterval(loadPublishersAndConnect, POLL_INTERVAL_MS);
</script>
</body>
</html>
