<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>{{ title }}</title>
    <link rel="stylesheet" href="/static/css/app.css"/>
    <style>
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .video-card {
            border: 1px solid #ccc;
            border-radius: 8px;
            overflow: hidden;
            background: #f9f9f9;
        }
        .video-card h3 {
            margin: 0;
            padding: 10px;
            background: #eee;
            border-bottom: 1px solid #ccc;
            text-align: center;
        }
        .video-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
            background: #444;
        }
    </style>
</head>
<body>
<main class="container">
    <h1>IoT Video Dashboard</h1>
    <p>실시간 카메라 스트리밍 (MQTT + WebSocket)</p>
    
    <div class="video-grid">
        <div class="video-card">
            <h3>Camera 1</h3>
            <img id="camera-1-image" alt="Camera 1 Stream">
        </div>
        <div class="video-card">
            <h3>Camera 2</h3>
            <img id="camera-2-image" alt="Camera 2 Stream">
        </div>
        <div class="video-card">
            <h3>Camera 3</h3>
            <img id="camera-3-image" alt="Camera 3 Stream">
        </div>
    </div>
</main>
<script>
    const cameras = ["camera-1", "camera-2", "camera-3"];

    function connectCamera(cameraId) {
        const img = document.getElementById(`${cameraId}-image`);
        const protocol = location.protocol === "https:" ? "wss" : "ws";
        const ws = new WebSocket(`${protocol}://${location.host}/api/ws/video/${cameraId}`);

        ws.onmessage = (event) => {
            const payload = JSON.parse(event.data);
            if (payload.type !== "frame" || !payload.image) return;
            img.src = `data:image/jpeg;base64,${payload.image}`;
        };

        ws.onclose = () => {
            setTimeout(() => connectCamera(cameraId), 1000);
        };

        ws.onerror = () => {
            ws.close();
        };
    }

    cameras.forEach((cameraId) => connectCamera(cameraId));
</script>
</body>
</html>
